# Pod — Secret'ı ENV veya Volume olarak kullan
#
# Çalıştır:
#   oc apply -f 02-pod-with-secret.yaml
#   oc exec -it secret-demo -- env | grep DB
#   oc exec -it secret-demo -- cat /etc/secrets/DB_PASS
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
  namespace: dev
spec:
  containers:
    - name: app
      image: registry.access.redhat.com/ubi8/ubi-minimal:latest
      command: ["sleep", "3600"]
      # Yöntem 1: ENV olarak al
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASS
      # Yöntem 2: Dosya olarak mount et
      volumeMounts:
        - name: secret-files
          mountPath: /etc/secrets
          readOnly: true
  volumes:
    - name: secret-files
      secret:
        secretName: db-secret
