# Namespace Kurulumu — 3 Senaryo için Hazırlık
#

# Oluşturulan namespace'ler:
#   app-ns   → frontend uygulaması (DB'ye erişmeli)
#   db-ns    → veritabanı (sadece app-ns'den erişilmeli)
#   other-ns → başka ekip (DB'ye ERİŞEMEMELİ)
#
# ÖNEMLİ: namespaceSelector çalışması için NS etiketlenmeli!
#
# Çalıştır:
#   oc apply -f 00-namespace-kurulum.yaml
#   oc get ns --show-labels | grep -E "app-ns|db-ns|other-ns"
# ─────────────────────────────────────────────────────────────────────────────
# app-ns: frontend uygulaması — db-ns'e erişim hakkı olacak
apiVersion: v1
kind: Namespace
metadata:
  name: app-ns
  labels:
    env: frontend        # NetworkPolicy bu etiketi kullanacak
---
# db-ns: veritabanı namespace'i
apiVersion: v1
kind: Namespace
metadata:
  name: db-ns
  labels:
    env: database
---
# other-ns: farklı ekip — DB'ye erişemeyecek
apiVersion: v1
kind: Namespace
metadata:
  name: other-ns
  labels:
    env: other
---
# Test pod'ları — her namespace'de bir pod
apiVersion: v1
kind: Pod
metadata:
  name: frontend-pod
  namespace: app-ns
  labels:
    app: frontend
spec:
  containers:
    - name: app
      image: registry.access.redhat.com/ubi8/ubi-minimal:latest
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: db-pod
  namespace: db-ns
  labels:
    app: postgres
spec:
  containers:
    - name: db
      image: registry.access.redhat.com/rhel8/postgresql-13:latest
      env:
        - name: POSTGRESQL_USER
          value: "appuser"
        - name: POSTGRESQL_PASSWORD
          value: "password"
        - name: POSTGRESQL_DATABASE
          value: "appdb"
      ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: db-ns
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Pod
metadata:
  name: other-pod
  namespace: other-ns
  labels:
    app: other-app
spec:
  containers:
    - name: app
      image: registry.access.redhat.com/ubi8/ubi-minimal:latest
      command: ["sleep", "3600"]
