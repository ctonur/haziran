# Secret — Şifreli değerler
#
# ConfigMap'ten farkı: değerler base64 ile saklanır,
# RBAC ile erişim kısıtlanabilir, etcd'de şifrelenebilir.
#
# base64 kodlama:
#   echo -n "admin"      | base64  → YWRtaW4=
#   echo -n "mypassword" | base64  → bXlwYXNzd29yZA==
#
# Çalıştır:
#   oc apply -f 01-secret.yaml
#   oc get secret db-secret -o jsonpath='{.data.DB_PASS}' | base64 -d
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: dev
type: Opaque
data:
  DB_USER: YWRtaW4=          # admin
  DB_PASS: bXlwYXNzd29yZA==  # mypassword
---
# stringData ile — base64 yazmadan (OpenShift otomatik çevirir)
apiVersion: v1
kind: Secret
metadata:
  name: db-secret-plain
  namespace: dev
type: Opaque
stringData:
  DB_USER: admin
  DB_PASS: mypassword
