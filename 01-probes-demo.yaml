# Health Probes — Uygulama sağlık kontrolleri
#
# startupProbe  → Uygulama başlayana kadar diğer probe'ları durdur
# livenessProbe → Yanıt vermiyorsa pod'u yeniden başlat
# readinessProbe→ Hazır değilse trafik gönderme
#
# Çalıştır:
#   oc apply -f 01-probes-demo.yaml
#   oc describe pod probe-demo  → Events bölümüne bak
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: probe-demo
  namespace: dev
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      # Startup: İlk başlamayı bekle (max 5 dk)
      startupProbe:
        httpGet:
          path: /
          port: 80
        failureThreshold: 30   # 30 deneme x 10 sn = 5 dakika
        periodSeconds: 10
      # Liveness: Yanıt vermezse yeniden başlat
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 15
        failureThreshold: 3
      # Readiness: Hazır olmadan trafik alma
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 3
